name: deploy

on:
  push:
    branches: ["main"]
  # fired by kio.dev when src/content changes (content is cloned at build time,
  # so a fresh deploy is how new posts reach the live site)
  repository_dispatch:
    types: [content-updated]

# never cancel an in-flight deploy; let pushes and content triggers serialize
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
