name: build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      # Smoke build only: the Dockerfile's non-tty run parses every post's
      # frontmatter, so a bad post (from kio.dev) fails the build here.
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          cache-from: type=gha,scope=kio-ssh
          cache-to: type=gha,scope=kio-ssh,mode=max
